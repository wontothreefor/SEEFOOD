<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOT HOTDOG</title>

<!-- Varsity display face, matched to the shirt lettering -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&display=swap" rel="stylesheet">

<!-- TensorFlow.js + the MobileNet wrapper, loaded from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>
  :root{
    --black:#0b0b0b;
    --red:#e11d1d;
    --green:#16b24a;
    --bun:#f0b35a;
    --ink:#f4f4f4;
    --muted:#8a8a8a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--black);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{min-height:100dvh;display:flex;justify-content:center;
    padding:24px 18px calc(24px + env(safe-area-inset-bottom));}
  .app{width:100%;max-width:460px;display:flex;flex-direction:column;align-items:center;gap:18px;}

  /* ---------- header / wordmark ---------- */
  .brand{font-family:"Graduate",serif;color:var(--red);
    font-size:clamp(26px,8vw,38px);letter-spacing:.06em;text-align:center;margin:0 0 -4px;}
  .mascot{width:88px;height:auto;display:block;}
  .hotdog{width:200px;height:auto;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));}
  .wordmark{font-family:"Graduate",serif;color:var(--red);
    font-size:clamp(34px,11vw,52px);line-height:.95;letter-spacing:.02em;
    text-align:center;margin:0;}
  .tagline{color:var(--muted);font-size:14px;text-align:center;margin:-6px 0 2px;}

  /* ---------- controls ---------- */
  .pick{position:relative;}
  .pick input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .btn{font-family:"Graduate",serif;background:var(--red);color:#fff;border:none;
    border-radius:14px;padding:16px 26px;font-size:20px;letter-spacing:.03em;
    cursor:pointer;display:inline-flex;align-items:center;gap:10px;
    box-shadow:0 6px 0 #8d0f0f;transition:transform .06s ease, box-shadow .06s ease;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 #8d0f0f;}
  .btn[disabled]{background:#3a3a3a;box-shadow:0 6px 0 #1f1f1f;color:#9a9a9a;cursor:wait;}

  /* ---------- result card ---------- */
  .stage{width:100%;display:none;flex-direction:column;gap:0;
    border-radius:16px;overflow:hidden;background:#000;}
  .photo{width:100%;display:block;}
  .banner{display:flex;align-items:center;gap:14px;padding:16px 18px;}
  .banner.hit{background:var(--green);}
  .banner.miss{background:var(--red);}
  .banner svg{flex:0 0 auto;width:34px;height:34px;}
  .verdict{font-family:"Graduate",serif;color:#fff;font-size:30px;line-height:1;}
  .caption{font-size:14px;color:rgba(255,255,255,.9);margin-top:4px;}
  .speak{margin-left:auto;background:rgba(0,0,0,.18);border:none;border-radius:10px;
    width:42px;height:42px;display:grid;place-items:center;cursor:pointer;}
  .speak svg{width:22px;height:22px;}
  .detail{font-size:12px;color:var(--muted);text-align:center;min-height:16px;}

  @media (prefers-reduced-motion: no-preference){
    .banner{animation:pop .25s ease;}
    @keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
  }
  :focus-visible{outline:3px solid #fff;outline-offset:2px;}
</style>
</head>

<body>
<div class="app">
  <h2 class="brand">SEE FOOD</h2>
  <img class="mascot" src="./face.png" alt="The face on the shirt">
  <img class="hotdog" src="./hotdog.png" alt="Cartoon hotdog">
  <h1 class="wordmark">NOT<br>HOTDOG</h1>
  <p class="tagline">Point it at anything. Find out if it's a hotdog.</p>

  <label class="pick">
    <button class="btn" id="btn" type="button" disabled>Warming up the grill</button>
    <input id="file" type="file" accept="image/*" capture="environment" disabled>
  </label>

  <div class="stage" id="stage">
    <img class="photo" id="photo" alt="Your photo">
    <div class="banner" id="banner">
      <span id="icon"></span>
      <div>
        <div class="verdict" id="verdict"></div>
        <div class="caption" id="caption"></div>
      </div>
      <button class="speak" id="speak" type="button" aria-label="Say it again">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/>
          <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
        </svg>
      </button>
    </div>
  </div>

  <p class="detail" id="detail"></p>
</div>

<script>
// ---------- SVG icons for the verdict banner ----------
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const CROSS = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';

// ---------- grab elements ----------
const btn = document.getElementById('btn');
const file = document.getElementById('file');
const stage = document.getElementById('stage');
const photo = document.getElementById('photo');
const banner = document.getElementById('banner');
const icon = document.getElementById('icon');
const verdict = document.getElementById('verdict');
const caption = document.getElementById('caption');
const detail = document.getElementById('detail');
const speakBtn = document.getElementById('speak');

let model = null;
let lastLine = '';      // remembers what to say when the speaker button is tapped

// ---------- 1. load + warm up the model ----------
async function init(){
  model = await mobilenet.load({version: 2, alpha: 1.0});   // MobileNet v2, full width
  const warm = tf.zeros([224, 224, 3]);                     // dummy image
  await model.classify(warm);                               // forces shader compile now
  warm.dispose();
  btn.textContent = 'Take a photo';                         // ready
  btn.disabled = false;
  file.disabled = false;
}
init();

// ---------- 2. iOS needs speech unlocked by a real tap ----------
let speechReady = false;
function unlockSpeech(){
  if (speechReady || !('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  speechSynthesis.speak(u);
  speechReady = true;
}
btn.addEventListener('pointerdown', unlockSpeech);

function say(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}
speakBtn.addEventListener('click', () => { if(lastLine) say(lastLine); });

// ---------- 3. when a photo is chosen, classify it ----------
file.addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if(!f || !model) return;

  photo.src = URL.createObjectURL(f);
  await photo.decode();                 // wait until the image is actually loaded
  stage.style.display = 'flex';
  detail.textContent = 'Thinking';

  const preds = await model.classify(photo, 5);   // top 5 guesses, highest first
  const top = preds[0];
  const label = top.className.toLowerCase();
  const isHotdog = label.includes('hotdog') || label.includes('hot dog');

  // first synonym only -> "tabby, tabby cat" becomes "tabby"
  const item = top.className.split(',')[0].trim();

  if(isHotdog){
    banner.className = 'banner hit';
    icon.innerHTML = CHECK;
    verdict.textContent = 'Hotdog';
    caption.textContent = '';
    lastLine = 'This is hotdog.';
  } else {
    banner.className = 'banner miss';
    icon.innerHTML = CROSS;
    verdict.textContent = 'Not hotdog';
    caption.textContent = `This is ${item.toLowerCase()}`;
    lastLine = `This is ${item.toLowerCase()}.`;
  }

  say(lastLine);
  detail.textContent = `top guess: ${item} (${Math.round(top.probability*100)}%)`;
});
</script>
</body>
</html>
